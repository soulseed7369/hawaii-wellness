<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede0bb"/>
      <stop offset="60%" stop-color="#e8d49a"/>
      <stop offset="100%" stop-color="#dfc88a"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7c45a" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#f5a030" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5a030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e8898"/>
      <stop offset="100%" stop-color="#1a5f6e"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50b8c8"/>
      <stop offset="100%" stop-color="#3aa0b0"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78d0da"/>
      <stop offset="100%" stop-color="#5cbcca"/>
    </linearGradient>
    <linearGradient id="mtLeft" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#8a7248"/>
      <stop offset="40%" stop-color="#6a5232"/>
      <stop offset="100%" stop-color="#4a3820"/>
    </linearGradient>
    <linearGradient id="mtRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e4e3a"/>
      <stop offset="100%" stop-color="#283028"/>
    </linearGradient>
    <clipPath id="badgeClip">
      <circle cx="70" cy="70" r="58"/>
    </clipPath>
  </defs>

  <!-- Outer dark ring -->
  <circle cx="70" cy="70" r="68" fill="#2c3e3e"/>
  <!-- Thin cream separator ring -->
  <circle cx="70" cy="70" r="63" fill="#f0e6c4"/>
  <!-- Inner background -->
  <circle cx="70" cy="70" r="58" fill="#f0e6c4"/>

  <g clip-path="url(#badgeClip)">
    <!-- Sky -->
    <rect x="12" y="12" width="116" height="75" fill="url(#sky)"/>

    <!-- Sun glow halo -->
    <circle cx="74" cy="44" r="24" fill="url(#sunGlow)"/>
    <!-- Sun disc -->
    <circle cx="74" cy="44" r="14" fill="#e8902a"/>
    <circle cx="74" cy="44" r="14" fill="#f5b03a" fill-opacity="0.5"/>
    <!-- Sun horizon cut by mountains -->

    <!-- Back mountain ridge (dark green) -->
    <path d="M12,78 L12,58 L24,44 L36,54 L50,40 L62,52 L72,44 L84,56 L96,46 L108,54 L128,50 L128,78 Z"
          fill="url(#mtRight)" opacity="0.9"/>

    <!-- Left cliff face (warm brown/gold) -->
    <path d="M12,78 L12,62 L20,54 L30,60 L38,52 L48,65 L54,78 Z"
          fill="url(#mtLeft)"/>
    <!-- Cliff shadow -->
    <path d="M12,78 L12,65 L18,60 L26,66 L34,58 L42,70 L50,78 Z"
          fill="#2a1a0a" fill-opacity="0.25"/>
    <!-- Cliff highlight edge -->
    <path d="M20,54 L30,60 L38,52 L48,65" stroke="#c09050" stroke-width="0.8" fill="none" stroke-opacity="0.4"/>

    <!-- Ocean base -->
    <rect x="12" y="76" width="116" height="44" fill="url(#ocean)"/>

    <!-- Mid wave -->
    <path d="M12,76 Q24,69 36,76 Q48,83 60,76 Q72,69 84,76 Q96,83 108,76 Q120,69 128,74 L128,83 Q120,77 108,84 Q96,91 84,84 Q72,77 60,84 Q48,91 36,84 Q24,77 12,84 Z"
          fill="url(#wave1)"/>

    <!-- Front wave -->
    <path d="M12,88 Q22,82 32,88 Q42,94 52,88 Q62,82 72,88 Q82,94 92,88 Q102,82 112,88 Q122,94 128,90 L128,99 Q122,96 112,99 Q102,105 92,99 Q82,93 72,99 Q62,105 52,99 Q42,93 32,99 Q22,105 12,99 Z"
          fill="url(#wave2)"/>

    <!-- Foam lines -->
    <path d="M12,83 Q22,79 32,83 Q42,87 52,83 Q62,79 72,83"
          stroke="white" stroke-width="1.3" fill="none" stroke-opacity="0.55"/>
    <path d="M68,93 Q80,89 92,93 Q104,97 116,93"
          stroke="white" stroke-width="1.3" fill="none" stroke-opacity="0.55"/>

    <!-- Subtle texture overlay (aged effect) -->
    <rect x="12" y="12" width="116" height="116" fill="#6b5030" fill-opacity="0.05"/>
  </g>

  <!-- Outer ring stroke -->
  <circle cx="70" cy="70" r="68" fill="none" stroke="#2c3e3e" stroke-width="2.5"/>
  <!-- Inner cream ring -->
  <circle cx="70" cy="70" r="63" fill="none" stroke="#e8d4a0" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text
    x="156" y="58"
    font-family="Georgia, 'Times New Roman', 'Book Antiqua', serif"
    font-size="44"
    font-weight="700"
    fill="#2c3e3e"
    letter-spacing="-1"
  >Hawai&#699;i Wellness</text>
</svg>
